# PurpleSector Cloud Pipeline — Local Development Stack
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Services:
#   - Redpanda (Kafka-compatible message buffer) — :9092 (Kafka API), :8081 (Schema Registry), :8082 (Redpanda Console)
#   - gRPC Gateway (telemetry ingress)           — :50051
#   - RisingWave (stream processing)             — :4566 (SQL), :5691 (Dashboard)
#   - Math Channel UDF (Python expression eval)  — :8815
#   - Redis (live telemetry state)               — :6379
#   - MinIO (S3-compatible object storage)        — :9000 (API), :9001 (Console)
#   - WebSocket Server (Redis → WS → Frontend)   — :8080
#   - Trino (semantic query layer)               — :8083
#   - Postgres (app metadata DB)                  — :5432

services:
  # ── Redpanda (replaces Confluent Kafka + Zookeeper) ─────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: ps-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"   # Kafka API
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # HTTP Proxy (Redpanda Console API)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console (web UI for topics, messages, consumer groups)
  redpanda-console:
    image: redpandadata/console:latest
    container_name: ps-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081

  # ── gRPC Gateway (telemetry ingress → Redpanda) ────────────────────
  grpc-gateway:
    build:
      context: .
      dockerfile: rust/crates/ps-grpc-gateway/Dockerfile
    container_name: ps-grpc-gateway
    ports:
      - "50051:50051"
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: telemetry-batches
      GRPC_PORT: "50051"
      AUTH_DISABLED: "true"
      RUST_LOG: info,ps_grpc_gateway=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo '' > /dev/tcp/localhost/50051"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RisingWave (stream processing engine) ───────────────────────────
  risingwave:
    image: risingwavelabs/risingwave:latest
    container_name: ps-risingwave
    command: single-node
    ports:
      - "4566:4566"   # Postgres-compatible SQL endpoint
      - "5691:5691"   # RisingWave Dashboard
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      RUST_LOG: info
      RW_CONFIG_PATH: /risingwave/config/risingwave.toml
    volumes:
      - risingwave-data:/risingwave
      - ./proto:/risingwave/proto:ro
      - ./infra/risingwave/risingwave.toml:/risingwave/config/risingwave.toml:ro

  # ── Math Channel UDF Server (Python, evaluates user expressions) ────
  math-channel-udf:
    build:
      context: ./infra/risingwave/udf
      dockerfile: Dockerfile
    container_name: ps-math-channel-udf
    ports:
      - "8815:8815"
    depends_on:
      - risingwave
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8815)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Redis (live telemetry state for WebSocket push) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: ps-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── WebSocket Server (Redis Pub/Sub → WebSocket → Frontend) ─────────
  # Data flows directly from RisingWave Redis sinks (no polling)
  ws-server:
    build:
      context: .
      dockerfile: services/Dockerfile.ws-server
    container_name: ps-ws-server
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      risingwave:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      WS_PORT: "8080"
      WS_HOST: "0.0.0.0"
      BACKFILL_COUNT: "50"
      POLL_INTERVAL_MS: "10"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').connect(8080,'localhost',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── MinIO (S3-compatible storage for Iceberg tables) ────────────────
  minio:
    image: minio/minio:latest
    container_name: ps-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Create default S3 buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: ps-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/purplesector-telemetry;
      mc mb --ignore-existing local/purplesector-iceberg;
      echo 'Buckets created';
      exit 0;
      "

  # ── LakeKeeper Migration (Run once, then exit) ──────────────────────
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    container_name: ps-lakekeeper-migrate
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://purplesector:devpassword@postgres:5432/purplesector
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://purplesector:devpassword@postgres:5432/purplesector
      LAKEKEEPER__PG_ENCRYPTION_KEY: my-secret-key-change-me-in-production
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  # ── LakeKeeper (REST Catalog for Iceberg) ───────────────────────────
  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    container_name: ps-lakekeeper
    ports:
      - "8181:8181"
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://purplesector:devpassword@postgres:5432/purplesector
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://purplesector:devpassword@postgres:5432/purplesector
      LAKEKEEPER__PG_ENCRYPTION_KEY: my-secret-key-change-me-in-production
      LAKEKEEPER__BASE_URI: http://lakekeeper:8181
      LAKEKEEPER__ENABLE_DEFAULT_PROJECT: "true"
    command: ["serve"]
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8181' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  # ── Trino (semantic query layer over Iceberg + Redis) ───────────────
  trino:
    build:
      context: ./infra/trino
      dockerfile: Dockerfile
    container_name: ps-trino
    ports:
      - "8083:8080"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      HADOOP_CONF_DIR: /etc/hadoop/conf
    depends_on:
      - minio
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
      - ./infra/trino/core-site.xml:/etc/hadoop/conf/core-site.xml:ro

  # ── Postgres (app metadata DB) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ps-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: purplesector
      POSTGRES_USER: purplesector
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "purplesector"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Time Ticker (provides deterministic NOW() for RisingWave) ───────
  time-ticker:
    build:
      context: ./services
      dockerfile: Dockerfile.time-ticker
    container_name: ps-time-ticker
    environment:
      REDPANDA_BROKER: ps-redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f time-ticker.py || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redpanda-data:
    driver: local
  risingwave-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  pgdata:
    driver: local
